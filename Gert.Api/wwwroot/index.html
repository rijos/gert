<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gert</title>

    <!-- fonts (the only external assets; everything else is self-hosted) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- styles: tokens MUST load first so variables exist before any rule -->
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />

    <!-- import map: bare specifiers resolve to the vendored libs. van.js and
         van-x.js are vendored by the orchestrator (downloaded), not authored here. -->
    <script type="importmap">
      {
        "imports": {
          "van": "/lib/van.js",
          "vanjs-core": "/lib/van.js",
          "van-x": "/lib/van-x.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- "Gert" keeps the SPA-fallback test green before the module mounts. -->
    <noscript>Gert requires JavaScript.</noscript>
    <div id="app">Gert</div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
