<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gert</title>

    <!-- Fonts are self-hosted only (CSP forbids external CDNs — style-src 'self').
         The tokens.css font stack falls back to system fonts; vendor woff2 under
         /fonts + @font-face for the Fraunces/Hanken/JetBrains look. TODO: vendor fonts. -->

    <!-- styles: tokens MUST load first so variables exist before any rule; the area
         partials load after components.css so area rules win the cascade -->
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/areas/sidebar.css" />
    <link rel="stylesheet" href="/styles/areas/main.css" />
    <link rel="stylesheet" href="/styles/areas/canvas.css" />
    <link rel="stylesheet" href="/styles/areas/composer.css" />
    <link rel="stylesheet" href="/styles/areas/artifacts.css" />

    <!-- import map: bare specifiers resolve to the vendored libs. van.js and
         van-x.js are vendored by the orchestrator (downloaded), not authored here. -->
    <script type="importmap">
      {
        "imports": {
          "van": "/lib/van.js",
          "vanjs-core": "/lib/van.js",
          "van-x": "/lib/van-x.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- "Gert" keeps the SPA-fallback test green before the module mounts. -->
    <noscript>Gert requires JavaScript.</noscript>
    <div id="app">Gert</div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
