<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gert</title>
    <!-- SVG favicon from the brand mark; img-src 'self' covers it. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Fonts are self-hosted only (CSP forbids external CDNs - style-src 'self');
         the tokens.css font stack falls back to system fonts. TODO: vendor fonts. -->

    <!-- Global styles only; components inject their own CSS at runtime via
         component() (lib/component.js). tokens MUST load first so variables exist
         before any rule references them. These <link>s load before any injected
         component style, so layout's responsive rules keep their cascade position. -->
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/primitives.css" />
  </head>
  <body>
    <!-- "Gert" keeps the SPA-fallback test green before the module mounts. -->
    <noscript>Gert requires JavaScript.</noscript>
    <div id="app">Gert</div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
