<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gert component harness</title>

    <!--
      Component-unit harness (testing.md section 8). The Fake host serves this at
      /tests/harness.html (dev-only mapping of tests/web/ -> /tests/), so the real
      app modules import on the SAME ORIGIN: /components/..., /state/...,
      /services/..., and module imports use absolute same-origin paths (no map).

      A test mounts a real, unmocked VanJS component via page.evaluate() and either
      returns a value to Python or asserts via Playwright locators. window.__mount
      is the convenience helper; document.body is otherwise empty so each mount
      starts clean.
    -->

    <!-- styles, so mounted components carry their real classes/visibility -->
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
  </head>
  <body>
    <div id="harness-root"></div>
    <!-- External module (NOT inline): the host CSP is `script-src 'self'`, so an
         inline bootstrap would be blocked. See harness.js. -->
    <script type="module" src="/tests/harness.js"></script>
  </body>
</html>
